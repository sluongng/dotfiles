# User-local application defaults.
# Source this file after defaults.conf where commands consume these values.
$filemanager = dolphin
$applauncher = walker
$terminal = ghostty
# Do not lock on idle; hyprlock can collapse Steam Remote Play framerate.
$idlehandler = swayidle -w before-sleep '~/.config/hypr/scripts/steamlink-host-mode maybe-lock'
