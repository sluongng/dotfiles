# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                     User Overrides                          ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
#
# Layering model:
# 1) Upstream Hyprland reference:
#    /usr/share/hypr/hyprland.conf (package: hyprland)
# 2) CachyOS default baseline:
#    /etc/skel/.config/hypr (package: cachyos-hyprland-settings)
# 3) Local overrides:
#    this file (~/.config/hypr/config/user-overrides.conf)
#
# Keep local changes in this file only so package defaults can be refreshed
# without re-merging edits across many files.
#
# Current local overrides in this file:
# - App defaults: dolphin, walker, ghostty, swayidle
# - Monitor: Samsung Odyssey G70B pinned by EDID description
# - Environment: XDG_MENU_PREFIX, XMODIFIERS
# - Input: keyboard repeat rate/delay, Caps Lock as Ctrl
# - Animations: windowsMove/workspacesIn/workspacesOut disabled
# - Rendering/stability: vrr=0, direct_scanout=0, send_content_type=false
# - Ecosystem: update/donation notifications disabled
# - Workspace rules: zero gaps on selected workspaces
# - Window rules: app workspace placement, Codex App pet overlay pinned
#   without normal window chrome
# - Keybind overrides: IME toggle, fullscreen behavior, lock key, waybar toggle,
#   monitor recovery, MX Ergo recovery, Steam Link host mode
#
# Maintenance workflow:
# 1) Refresh package defaults.
# 2) Keep baseline files close to package defaults.
# 3) Re-apply local behavior only in this file.

# ======= Application Defaults =======
source = ~/.config/hypr/config/user-app-defaults.conf

# ======= Monitor =======
monitor = desc:Samsung Electric Company Odyssey G70B H1AK500000, 3840x2160@60, 0x0, 1

# ======= Environment =======
envd = XDG_MENU_PREFIX,arch-
envd = XMODIFIERS,@im=fcitx

# ======= Input =======
input {
    repeat_rate = 40
    repeat_delay = 200
    kb_options = ctrl:nocaps
}

# ======= Animations =======
animations {
    animation = windowsMove, 0
    animation = workspacesIn, 0
    animation = workspacesOut, 0
}

# ======= Rendering / Stability =======
misc {
    vrr = 0
    focus_on_activate = false
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

render {
    direct_scanout = 0
    send_content_type = false
}

opengl {
    nvidia_anti_flicker = true
}

# ======= Workspace Rules =======
workspace = w[tv1-10], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0

# ======= Window Rules =======
windowrule {
    name = app-workspace-ghostty
    workspace = 1 silent
    no_initial_focus = on
    suppress_event = activate activatefocus
    match:class = ^com\.mitchellh\.ghostty$
}

windowrule {
    name = app-workspace-chrome
    workspace = 2 silent
    no_initial_focus = on
    # Terminal URL clicks should switch to Chrome after opening the tab.
    focus_on_activate = on
    match:class = ^google-chrome$
}

windowrule {
    name = app-workspace-slack
    workspace = 3 silent
    no_initial_focus = on
    suppress_event = activate activatefocus
    match:class = ^slack$
}

windowrule {
    name = app-workspace-discord
    workspace = 4 silent
    no_initial_focus = on
    suppress_event = activate activatefocus
    match:class = ^discord$
}

windowrule {
    name = app-workspace-steam
    workspace = 6 silent
    no_initial_focus = on
    suppress_event = activate activatefocus
    match:class = ^steam$
}

windowrule {
    name = codex-app-pet-overlay
    pin = on
    border_size = 0
    rounding = 0
    no_blur = on
    match:class = ^(Codex|electron)$
    match:title = ^Codex$
    match:float = 1
}

# ======= Keybind Overrides =======
# Remove upstream defaults we intentionally replace.
unbind = $mainMod SHIFT, M
unbind = $mainMod, F
unbind = $mainMod, L
unbind = $mainMod, Tab

bindd = ALT, SPACE, Toggles Vietnamese IME, exec, fcitx5-remote -t
bindd = $mainMod, F, Toggles compositor fullscreen (Chromium-safe), fullscreenstate, 2 0
bindd = $mainMod SHIFT, F, Toggles native app fullscreen mode, fullscreen, 0
bindd = $mainMod SHIFT, L, Lock the screen, exec, hyprlock
bindd = $mainMod, B, Toggle Waybar visibility, exec, killall -SIGUSR1 waybar
bindd = $mainMod CTRL, O, Recover the monitor, exec, hyprctl --batch "keyword monitor desc:Samsung Electric Company Odyssey G70B H1AK500000,3840x2160@60,0x0,1; dispatch dpms on HDMI-A-1; reload"
bindd = $mainMod CTRL, M, Reconnect MX Ergo, exec, ~/.config/hypr/scripts/mx-ergo-recover recover
bindd = $mainMod CTRL, S, Enable Steam Link host mode with local input lockout, exec, ~/.config/hypr/scripts/steamlink-host-mode on
bindd = $mainMod CTRL SHIFT, S, Disable Steam Link host mode and restore local input, exec, ~/.config/hypr/scripts/steamlink-host-mode off
bindd = $mainMod SHIFT, S, Creates a screenshot of an area, exec, $shot-region
bindd = $mainMod, Tab, Switch to next workspace, workspace, e+1
bindd = $mainMod SHIFT, Tab, Switch to previous workspace, workspace, e-1
