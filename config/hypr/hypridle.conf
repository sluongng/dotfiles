# Hypridle config: lock after 30 minutes and before sleep.
# Steam Link host mode keeps Remote Play streamable by skipping hyprlock while
# the host-mode script disables local input and turns the monitor off.

general {
    lock_cmd = ~/.config/hypr/scripts/steamlink-host-mode maybe-lock
    before_sleep_cmd = ~/.config/hypr/scripts/steamlink-host-mode maybe-lock
}

listener {
    timeout = 1800
    on-timeout = ~/.config/hypr/scripts/steamlink-host-mode maybe-lock
}
