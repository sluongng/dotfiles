# Source of truth: this file lives in ~/.dotfiles/config/codex/config.toml.
# Keep ~/.codex/config.toml as a symlink to this file; if it becomes a regular file, sync changes back here and restore the symlink.

model = "gpt-5.4"
model_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"
show_raw_agent_reasoning = true

approval_policy = "never"
sandbox_mode = "danger-full-access"

web_search = "live"

project_doc_fallback_filenames = [
  "CLAUDE.md",
  "OS.AGENTS.md",
]

suppress_unstable_features_warning = true
[features]
multi_agent = true
responses_websockets_v2 = true
memories = true
undo = true

[agents]
max_threads = 12 # default is 6
max_depth = 2

[agents.explorer]
config_file = "./agents/explorer.toml"

[tui]
status_line = ["model-with-reasoning", "project-root", "git-branch", "context-used", "five-hour-limit", "weekly-limit", "codex-version"]

# [mcp_servers.chrome-devtools]
# command = "npx"
# args = ["chrome-devtools-mcp@latest", "--autoConnect"]

#### TRASH ####

[notice]
hide_gpt5_1_migration_prompt = true
"hide_gpt-5.1-codex-max_migration_prompt" = true
hide_rate_limit_model_nudge = true

[notice.model_migrations]
"gpt-5.2" = "gpt-5.2-codex"

[projects."/home/nb"]
trust_level = "trusted"

[projects."/home/nb/work/misc/codex-app"]
trust_level = "trusted"

[projects."/home/nb/work/buildbuddy-io/buildbuddy"]
trust_level = "trusted"

[projects."/home/nb/.codex"]
trust_level = "trusted"

[projects."/home/nb/work/misc/codex"]
trust_level = "trusted"

[projects."/home/nb/work/bazelbuild/bazel"]
trust_level = "trusted"
