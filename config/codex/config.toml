# Source of truth for shared Codex config: this file lives in ~/.dotfiles/config/codex/config.toml.
# automation/codex/install-codex.sh renders ${CODEX_HOME:-~/.codex}/config.toml from this file plus local overlays.
# Do not add [projects] here; machine-local trust entries belong in the selected Codex home's projects.local.toml.
# Last reviewed for codex-cli v0.137.0 and current main on 2026-06-04.

model = "gpt-5.5"
model_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"
plan_mode_reasoning_effort = "xhigh"
show_raw_agent_reasoning = true

approval_policy = "never"
sandbox_mode = "danger-full-access"

web_search = "live"

project_doc_fallback_filenames = [
  "AGENTS.override.md",
  "CLAUDE.md",
  "OS.AGENTS.md",
]

suppress_unstable_features_warning = true
personality = "pragmatic"
service_tier = "fast"
[features]
apply_patch_streaming_events = true
auth_elicitation = true
child_agents_md = true
code_mode = true
code_mode_only = true
default_mode_request_user_input = true
enable_fanout = true
goals = true
local_thread_store_compression = true
memories = true
mentions_v2 = true
prevent_idle_sleep = true
remote_compaction_v2 = true
runtime_metrics = true
# Use Codex's bundled zsh fork from the installed package; leave zsh_path unset
# so each installation can resolve its own packaged binary.
shell_zsh_fork = true
unified_exec = true
unified_exec_zsh_fork = true

[features.multi_agent_v2]
enabled = false
max_concurrent_threads_per_session = 13 # counts root; preserves 12 spawned agents

[agents]
max_depth = 2

[tui]
alternate_screen = "never"
status_line = ["model-with-reasoning", "project-root", "git-branch", "context-used", "five-hour-limit", "weekly-limit", "codex-version"]
session_picker_view = "dense"

# Linux desktop trust entries kept here as comments on purpose.
# They are not meant to be active on this laptop.
# [projects."/home/nb"]
# trust_level = "trusted"
#
# [projects."/home/nb/work/misc/codex-app"]
# trust_level = "trusted"
#
# [projects."/home/nb/work/buildbuddy-io/buildbuddy"]
# trust_level = "trusted"
#
# [projects."/home/nb/.codex"]
# trust_level = "trusted"
#
# [projects."/home/nb/work/misc/codex"]
# trust_level = "trusted"
#
# [projects."/home/nb/work/bazelbuild/bazel"]
# trust_level = "trusted"
#
# Chrome DevTools MCP is intentionally not enabled in the shared or always-on
# local config. Configured MCP servers start during every Codex conversation;
# prefer the codex-chrome-linux skill and Chrome Extension native host bridge
# for Linux Chrome control. For a deliberate Chrome DevTools MCP session,
# temporarily enable the local ${CODEX_HOME:-~/.codex}/config.local.toml stanza.

[plugins."gmail@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true
