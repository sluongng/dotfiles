# Source of truth: this file lives in ~/.dotfiles/config/codex/config.toml.
# Keep ~/.codex/config.toml as a symlink to this file; if it becomes a regular file, sync changes back here and restore the symlink.

model = "gpt-5.4"
model_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"
show_raw_agent_reasoning = true

approval_policy = "never"
sandbox_mode = "danger-full-access"

web_search = "live"

project_doc_fallback_filenames = [
  "CLAUDE.md",
  "OS.AGENTS.md",
]

suppress_unstable_features_warning = true
personality = "pragmatic"
[features]
multi_agent = true
responses_websockets_v2 = true
memories = true
undo = true

[agents]
max_threads = 12 # default is 6
max_depth = 2

[agents.explorer]
description = '''
Use `explorer` for specific codebase questions.
Explorers are fast and authoritative.
They must be used to ask specific, well-scoped questions on the codebase.
Rules:
- In order to avoid redundant work, you should avoid exploring the same problem that explorers have already covered. Typically, you should trust the explorer results without additional verification. You are still allowed to inspect the code yourself to gain the needed context!
- You are encouraged to spawn up multiple explorers in parallel when you have multiple distinct questions to ask about the codebase that can be answered independently. This allows you to get more information faster without waiting for one question to finish before asking the next. While waiting for the explorer results, you can continue working on other local tasks that do not depend on those results. This parallelism is a key advantage of delegation, so use it whenever you have multiple questions to ask.
- Reuse existing explorers for related questions.
'''
config_file = "./agents/explorer.toml"

[tui]
status_line = ["model-with-reasoning", "project-root", "git-branch", "context-used", "five-hour-limit", "weekly-limit", "codex-version"]

# [mcp_servers.chrome-devtools]
# command = "npx"
# args = ["chrome-devtools-mcp@latest", "--autoConnect"]

#### TRASH ####

[notice]
hide_gpt5_1_migration_prompt = true
"hide_gpt-5.1-codex-max_migration_prompt" = true
hide_rate_limit_model_nudge = true

[notice.model_migrations]
"gpt-5.2" = "gpt-5.2-codex"

