# Source of truth for shared Codex config: this file lives in ~/.dotfiles/config/codex/config.toml.
# automation/codex/install-codex.sh renders ~/.codex/config.toml from this file plus local overlays.
# Do not add [projects] here; machine-local trust entries belong in ~/.codex/projects.local.toml.
# Last reviewed for codex-cli v0.130.0 on 2026-05-10.

model = "gpt-5.5"
model_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"
plan_mode_reasoning_effort = "xhigh"
show_raw_agent_reasoning = true

approval_policy = "never"
default_permissions = ":danger-no-sandbox"

web_search = "live"

project_doc_fallback_filenames = [
  "AGENTS.override.md",
  "CLAUDE.md",
  "OS.AGENTS.md",
]

suppress_unstable_features_warning = true
personality = "pragmatic"
service_tier = "fast"
[features]
goals = true
memories = true
prevent_idle_sleep = true
tool_search = true

[features.multi_agent_v2]
enabled = true
max_concurrent_threads_per_session = 13 # counts root; preserves 12 spawned agents

[agents]
max_depth = 2

[tui]
alternate_screen = "never"
status_line = ["model-with-reasoning", "project-root", "git-branch", "context-used", "five-hour-limit", "weekly-limit", "codex-version"]

